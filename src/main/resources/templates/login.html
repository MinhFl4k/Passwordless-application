<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <meta charset="UTF-8">
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<style>
    .navbar {
        background-color: #d9edf7;
    }

</style>
<body>
<nav class="navbar navbar-inverse navbar-fixed-top">
    <div class="container">
        <div class="navbar-header">
            <h2>Home</h2>
        </div>
    </div>
</nav>

<br><br><br><br><br><br><br>

<div class="container">
    <h1>Login</h1>

    <div th:if="${param.error}" class="alert alert-info">
        Invalid email or password. Please try again.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label class="control-label" for="username"> Email</label>
            <input type="email" id="username" name="username" placeholder="Enter your email"  class="form-control">
        </div>

        <div class="form-group">
            <label class="control-label" for="password"> Password </label>
            <input type="password" id="password" name="password" placeholder="Enter your password" class="form-control"/>
        </div>

        <div class="form-group">
            <button type="submit" class="btn btn-primary">Log In</button>
        </div>
        <div class="form-group">
            <span> Don't have an account? <a href="/" th:href="@{/signup}">Signup here</a></span>
        </div>
    </form>

    <hr>

    <div style="display: flex; gap: 10px;">
        <a th:href="@{/oauth2/authorization/google}" class="btn btn-danger">
            <i class="fa fa-google"></i> Login with Google
        </a>

        <a th:href="@{/oauth2/authorization/github}" class="btn btn-dark">
            <i class="fa fa-github"></i> Login with GitHub
        </a>

        <a th:href="@{/oauth2/authorization/facebook}" class="btn btn-dark">
            <i class="fa fa-facebook"></i> Login with Facebook
        </a>

        <a href="/" th:href="@{/otp-login}" class="btn btn-danger">Login with OTP</a>
        <a href="/" th:href="@{/one-click-login}" class="btn btn-success">Login instantly with email</a>
    </div>
    <hr>
</div>
</body>
</html>
