<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fast login</title>
    <meta charset="UTF-8">
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
</head>
<style>
    .navbar {
        background-color: #d9edf7;
    }

</style>
<body>
<nav class="navbar navbar-inverse navbar-fixed-top">
    <div class="container">
        <div class="navbar-header">
            <h2>Home</h2>
        </div>
    </div>
</nav>

<br><br><br><br><br><br><br>

<div class="container">
    <h2>Fast login</h2>

    <form th:action="@{/new-login}" th:object="${emailRequest}" method="post">
        <div class="form-group">
            <label>Email</label>
            <input type="text" th:field="*{email}" class="form-control" placeholder="Enter email">
            <div th:if="${#fields.hasErrors('email')}" class="text-danger">
                <span th:errors="*{email}"></span>
            </div>
        </div>

        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <button type="submit" class="btn btn-primary">Continue</button>
        <a href="/" th:href="@{/login}" class="btn btn-danger">Back</a>
    </form>
</div>
</body>
</html>
