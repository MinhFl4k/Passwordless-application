<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login Test</title>
    <meta charset="UTF-8">
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
</head>
<body>
<div class="container" style="margin-top: 100px; max-width: 500px;">
    <h2>New login Test</h2>

    <form th:action="@{/new-login}" th:object="${emailRequest}" method="post">
        <div class="form-group">
            <label>Email</label>
            <input type="text" th:field="*{email}" class="form-control" placeholder="Enter email">
            <div th:if="${#fields.hasErrors('email')}" class="text-danger">
                <span th:errors="*{email}"></span>
            </div>
        </div>

        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <button type="submit" class="btn btn-primary">Continue</button>
        <a href="/" th:href="@{/login}" class="btn btn-danger">Back</a>
    </form>
</div>
</body>
</html>
